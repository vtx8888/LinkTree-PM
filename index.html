<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Oficiais</title>
    <!-- Importando fontes parecidas com o design original -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cyan: #47bbed;
            --bg-overlay: rgba(6, 12, 18, 0.88); /* Azul muito escuro e quase opaco */
            --text-light: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: transparent;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* ----- GRADE DE FOTOS DE FUNDO ----- */
        .background-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 6px;
            background-color: #000;
            z-index: -2;
        }

        .bg-photo {
            background-size: cover;
            background-position: center;
        }

        /* Overlay escuro que fica por cima das fotos */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-overlay);
            z-index: -1;
        }

        /* ----- CABEÇALHO SUPERIOR ESQUERDO (LOGO) ----- */
        .top-logo {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background-color: #0b1a26;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(71, 187, 237, 0.4); /* Brilho ciano */
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--cyan);
            font-weight: bold;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .logo-text span {
            display: block;
            font-family: 'Roboto', sans-serif;
            font-size: 0.5rem;
            font-weight: 400;
            color: var(--cyan);
            letter-spacing: 2px;
        }

        /* ----- CONTEÚDO PRINCIPAL (LINKTREE) ----- */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .subtitle {
            color: var(--cyan);
            letter-spacing: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .subtitle::before, .subtitle::after {
            content: "";
            height: 1px;
            width: 40px;
            background-color: var(--cyan);
            margin: 0 15px;
            opacity: 0.4;
        }

        .title {
            font-family: 'Montserrat', sans-serif;
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1;
            margin: 0;
            text-transform: uppercase;
        }

        .title-cyan {
            color: var(--cyan);
            display: block;
            font-size: 3.5rem;
        }

        .description {
            margin-top: 25px;
            font-size: 1.1rem;
            color: #d1d5db;
        }

        .description-sub {
            margin-top: 8px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.45);
        }

        /* Barra colorida (Amarelo, Branco, Azul) */
        .color-bar {
            width: 250px;
            height: 4px;
            background: linear-gradient(90deg, #facc15 0%, #ffffff 50%, #3b82f6 100%);
            border-radius: 2px;
            margin: 20px 0 30px 0;
        }

        /* ----- BOTÕES DOS LINKS ----- */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 320px;
        }

        .link-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: radial-gradient(
                circle at var(--mx, 80%) var(--my, 50%),
                var(--c1) 0%,
                var(--c2) 100%
            );
            color: #fff;
            text-decoration: none;
            padding: 16px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            border: 0.5px solid rgba(255, 255, 255, 0.18);
            box-shadow: inset 0 0 28px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease;
        }

        .link-btn:hover {
            transform: translateY(-3px);
        }

        .whatsapp-btn  { --c1: #43e97b; --c2: #0e7a4e; --shadow: rgba(67,233,123,0.45); }
        .instagram-btn { --c1: #f9a825; --c2: #c2185b; --shadow: rgba(249,90,100,0.45); }
        .tiktok-btn    { --c1: #69c9d0; --c2: #1a1a2e; --shadow: rgba(105,201,208,0.45); }
        .kwai-btn      { --c1: #ff9f43; --c2: #ee5a24; --shadow: rgba(255,159,67,0.45); }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-left svg {
            flex-shrink: 0;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }

        /* ----- RODAPÉ ----- */
        .footer-note {
            margin-top: 50px;
            font-family: monospace;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .background-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(3, 1fr);
            }

            .top-logo {
                top: 16px;
                left: 16px;
                gap: 10px;
            }

            .logo-icon {
                width: 32px;
                height: 32px;
                font-size: 0.85rem;
                border-radius: 6px;
            }

            .logo-text {
                font-size: 0.75rem;
            }

            .main-content {
                padding: 80px 24px 36px;
                justify-content: flex-start;
            }

            .subtitle {
                font-size: 0.85rem;
                letter-spacing: 3px;
            }

            .subtitle::before, .subtitle::after {
                width: 24px;
                margin: 0 10px;
            }

            .title {
                font-size: 3.8rem;
            }

            .title-cyan {
                font-size: 3.1rem;
            }

            .description {
                margin-top: 14px;
                font-size: 1rem;
            }

            .description-sub {
                font-size: 0.78rem;
                padding: 0 8px;
                line-height: 1.5;
            }

            .color-bar {
                width: 180px;
                margin: 16px 0 22px 0;
            }

            .links-wrapper {
                max-width: 100%;
                gap: 12px;
            }

            .link-btn {
                padding: 15px 22px;
                font-size: 0.95rem;
            }

            .btn-left svg {
                width: 20px;
                height: 20px;
            }

            .footer-note {
                margin-top: 28px;
                font-size: 0.6rem;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>

    <!-- GRADE DE FUNDO: SUBSTITUA AS URLs PELAS SUAS FOTOS -->
    <div class="background-grid">
        <div class="bg-photo" style="background-image: url('photos/1.jpg');"></div>
        <div class="bg-photo" style="background-image: url('photos/2.jpg');"></div>
        <div class="bg-photo" style="background-image: url('photos/3.jpg');"></div>
        <div class="bg-photo" style="background-image: url('photos/4.jpg');"></div>
        <div class="bg-photo" style="background-image: url('photos/5.jpg');"></div>
        <div class="bg-photo" style="background-image: url('photos/6.jpg');"></div>
    </div>

    <!-- CAMADA ESCURA POR CIMA DAS FOTOS -->
    <div class="overlay"></div>

    <!-- LOGO NO CANTO SUPERIOR -->
    <div class="top-logo">
        <div class="logo-icon">&#x21A1;</div> <!-- Ícone de setas -->
        <div class="logo-text">
            PAULO MOURÃO
            <span>LINKS OFICIAIS</span>
        </div>
    </div>

    <!-- CONTEÚDO CENTRAL (LINKTREE) -->
    <div class="main-content">
        
        <div class="subtitle">CONECTE-SE COMIGO</div>
        
        <h1 class="title">
            REDES
            <span class="title-cyan">SOCIAIS</span>
        </h1>

        <div class="description">Siga nas redes sociais</div>
        <div class="description-sub"><em>Toque no botão e siga/entre no grupo do WhatsApp</em></div>

        <div class="color-bar"></div>

        <div class="links-wrapper">
            <a href="#" class="link-btn whatsapp-btn" target="_blank">

                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

                </span>

            <a href="https://www.instagram.com/paulomouraopt" class="link-btn instagram-btn" target="_blank">
                <span class="btn-left">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                    Instagram
                </span>
                <span>&#10132;</span>
            </a>
            <a href="https://www.tiktok.com/@paulomouraopt" class="link-btn tiktok-btn" target="_blank">
                <span class="btn-left">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>

                </span>
                <span>&#10132;</span>
            </a>
            <a href="#" class="link-btn kwai-btn" target="_blank">
                <span class="btn-left">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M4 2h4v8.5l7-8.5h5L12 12l8 10h-5l-7-8.5V22H4V2z"/></svg>
                    Kwai
                </span>
                <span>&#10132;</span>
            </a>
        </div>

        <div class="footer-note">
            ACESSO PÚBLICO - OFICIAL
        </div>

    </div>


<script>
    document.querySelectorAll('.link-btn').forEach(btn => {
        btn.addEventListener('mousemove', e => {
            const r = btn.getBoundingClientRect();
            btn.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
            btn.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
        });
        btn.addEventListener('mouseleave', () => {
            btn.style.setProperty('--mx', '80%');
            btn.style.setProperty('--my', '50%');
        });
        btn.addEventListener('touchstart', e => {
            const r = btn.getBoundingClientRect();
            const t = e.touches[0];
            btn.style.setProperty('--mx', ((t.clientX - r.left) / r.width * 100) + '%');
            btn.style.setProperty('--my', ((t.clientY - r.top) / r.height * 100) + '%');
        }, { passive: true });
        btn.addEventListener('touchend', () => {
            btn.style.setProperty('--mx', '80%');
            btn.style.setProperty('--my', '50%');
        }, { passive: true });
    });
</script>
</body>
</html>
